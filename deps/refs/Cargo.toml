
[package]
authors = ["Vladas Zakrevksis <146100@gmail.com>"]
description = "My vision of reference counting and resources management designed for GUI applications."
edition = "2024"
homepage = "https://github.com/VladasZ/refs"
license = "MIT OR Apache-2.0"
name = "refs"
repository = "https://github.com/VladasZ/refs"
version = "0.53.0"

[lib]
crate-type = ["dylib", "rlib", "staticlib"]
name = "refs"

[features]
checks = []
default = ["checks", "serde"]
pointers_info = []
serde = ["dep:serde"]
stats = []

[dependencies]
anyhow = "1.0"
event-listener = "5.4"
hreads = { path = "../hreads" }
log = "0.4"
parking_lot = "0.12"
reqwest = { version = "0.13", default-features = false, features = ["rustls"] }
rustc-hash = "2.1.2"
serde = { version = "1.0", optional = true }

[dev-dependencies]
pretty_assertions = "1.4"
serial_test = "3.4"
tokio = { version = "1.45", features = ["macros", "rt-multi-thread"] }
wasm-bindgen-test = "0.3"
