[package]
edition.workspace = true
name = "ui-proc"
version.workspace = true

[lib]
proc-macro = true

[features]
# Makes `view` emit the ctor that registers a UI test. Enabled through
# `test-engine/ui-tests`, never directly. Off means no ctor is generated at
# all, in any crate, so a shipped app carries nothing.
ui-tests = []

[dependencies]
parking_lot = { workspace = true }
quote = { workspace = true }
syn = { workspace = true }

[lints]
workspace = true
