name: Build

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"

env:
  CARGO_TERM_COLOR: always

jobs:
  typos:
    name: Spell Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Actions
        uses: actions/checkout@v4

      - name: Check for Typos
        uses: crate-ci/typos@master

  wasm:
    name: Wasm
    needs: [typos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{secrets.GITHUB_TOKEN}}
          submodules: recursive

      - name: Build
        run: make wasm

  ui-tests:
    name: UI Tests
    needs: [typos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{secrets.GITHUB_TOKEN}}
          submodules: recursive

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config libssl-dev xorg-dev libasound2-dev \
            mesa-common-dev libgl1-mesa-dev libglu1-mesa-dev mesa-vulkan-drivers

      - name: Run UI tests
        run: cargo run -p ui-test --profile=ci -- --stop-on-failure --headless

  build:
    name: Build
    needs: [typos]
    env:
      SKIP_UI_TESTS: 1
    strategy:
      fail-fast: false
      matrix:
        target: [
            { os: macos, runner: macos-latest },
            { os: windows, runner: windows-latest },

            { os: ios, runner: mac },
            #          { os: android, runner: ubuntu-latest },
          ]
    runs-on: ${{ matrix.target.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{secrets.GITHUB_TOKEN}}
          submodules: recursive

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Free Space
        if: ${{ matrix.target.os != 'windows' }}
        run: bun build/scripts/free_action_runner.ts

      - name: Build
        if: ${{ matrix.target.os != 'windows' }}
        run: bun build/build.ts ${{ matrix.target.os }}

      - name: Build windows
        if: ${{ matrix.target.os == 'windows' }}
        run: bun build/build.ts

      - name: Test
        if: ${{ matrix.target.os != 'ios' && matrix.target.os != 'android' }}
        run: make test

  linux:
    name: Build Linux
    needs: [typos]
    env:
      SKIP_UI_TESTS: 1
    strategy:
      fail-fast: false
      matrix:
        target:
          [
            { container: "ubuntu" },
            { container: "debian" },
            { container: "fedora" },
            { container: "archlinux" },
            { container: "amazonlinux" },
            { container: "dockerscripts/linuxmint:cinnamon-minimal" },
          ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{secrets.GITHUB_TOKEN}}
          submodules: recursive

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Free Space
        run: bun build/scripts/free_action_runner.ts

      - name: Build
        run: echo ${{ matrix.target.container }} && bun build/in_docker.ts ${{ matrix.target.container }}
