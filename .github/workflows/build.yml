name: Build

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"

env:
  CARGO_TERM_COLOR: always

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{secrets.GITHUB_TOKEN}}
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config libssl-dev xorg-dev libasound2-dev

      - name: Install quality tools
        run: |
          cargo install typos-cli --version 1.48.0 --locked
          cargo install cargo-machete --version 0.9.2 --locked

      - name: Run quality checks
        run: make ci

  wasm:
    name: Wasm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{secrets.GITHUB_TOKEN}}
          submodules: recursive

      - name: Build
        run: make wasm

  ui-tests:
    name: UI Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{secrets.GITHUB_TOKEN}}
          submodules: recursive

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config libssl-dev xorg-dev libasound2-dev \
            mesa-common-dev libgl1-mesa-dev libglu1-mesa-dev mesa-vulkan-drivers

      - name: Run UI tests
        run: cargo run -p ui-test --profile=ci -- --headless

  ios-ui-tests:
    name: iOS UI Tests
    runs-on: mac
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{secrets.GITHUB_TOKEN}}
          submodules: recursive

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Run UI tests on the iOS simulator
        run: bun ./build/ios/sim-test.ts

  build:
    name: Build
    strategy:
      fail-fast: false
      matrix:
        target: [
            { os: macos, runner: macos-latest },
            { os: windows, runner: windows-latest },

            { os: ios, runner: mac },
            { os: android, runner: ubuntu-latest },
          ]
    runs-on: ${{ matrix.target.runner }}
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{secrets.GITHUB_TOKEN}}
          submodules: recursive

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Free Space
        if: ${{ matrix.target.os != 'windows' }}
        run: bun build/scripts/free_action_runner.ts

      - name: Build and test
        if: ${{ matrix.target.os != 'windows' }}
        run: bun build/build.ts ${{ matrix.target.os }}

      - name: Build and test Windows
        if: ${{ matrix.target.os == 'windows' }}
        run: bun build/build.ts

  linux:
    name: Build Linux
    strategy:
      fail-fast: false
      matrix:
        target:
          [
            { container: "ubuntu" },
            { container: "debian" },
            { container: "fedora" },
            { container: "archlinux" },
            { container: "amazonlinux" },
            { container: "dockerscripts/linuxmint:cinnamon-minimal" },
          ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{secrets.GITHUB_TOKEN}}
          submodules: recursive

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Free Space
        run: bun build/scripts/free_action_runner.ts

      - name: Build
        run: echo ${{ matrix.target.container }} && bun build/in_docker.ts ${{ matrix.target.container }}
